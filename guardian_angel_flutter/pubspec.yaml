name: guardian_angel_flutter
description: Complete Women Safety App - Guardian Angel

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # Network & API
  dio: ^5.7.0
  http: ^1.2.2
  
  # Location & Maps
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  
  # Camera & Media
  camera: ^0.10.5+5
  
  # Sensors
  sensors_plus: ^5.0.1
  
  # Firebase
  firebase_core: ^3.7.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  
  # Permissions
  permission_handler: ^11.3.1
  
  # State Management
  provider: ^6.1.2
  
  # Socket
  socket_io_client: ^3.1.2
  
  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  
  # Animations
  lottie: ^3.1.2
  
  # AI/ML
  tflite_flutter: ^0.10.4
  
  # UI
  flutter_spinkit: ^5.2.1
  flare_flutter: ^3.0.0
  
  # Other
  url_launcher: ^6.3.1
  telephony: ^0.2.0
  contacts_service: ^0.6.3
  shake: ^2.2.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
